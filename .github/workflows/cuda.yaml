name: Build and Release CUDA Wheels

on:
  workflow_dispatch:

jobs:
  build_cuda_wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: "12.9.0"
          method: "network"
          log-file-suffix: "3.9.txt"
          use-github-cache: false
          use-local-cache: false

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Maturin
        run: pip install maturin>=1.8.6 numpy>=1.26.4

      - name: Build wheels with CUDA support
        uses: PyO3/maturin-action@v1
        with:
          command: "build"
          args: "--release --out dist --features cuda"

      - name: Create GitHub Release and Upload Wheels
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
