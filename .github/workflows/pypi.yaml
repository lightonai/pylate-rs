name: Build and Publish Python 🐍 distributions

on:
  push:
    branches:
      - main

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.variant.name }} on ${{ matrix.variant.os }}
    runs-on: ubuntu-22.04-gpu
    strategy:
      fail-fast: false
      matrix:
        variant:
          - {
              name: "cuda",
              os: "ubuntu-latest", # This OS is for reference, the 'runs-on' tag above is what matters.
              python-version: "3.9",
              cuda-version: "12.1.0",
            }
          - {
              name: "cuda",
              os: "ubuntu-latest",
              python-version: "3.9",
              cuda-version: "11.8.0",
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.variant.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.variant.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pip install maturin>=1.8.6 numpy>=1.26.4

      - name: Generate pyproject.toml for ${{ matrix.variant.name }}
        run: python generate_configs.py ${{ matrix.variant.name }}

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant.name }}${{ matrix.variant.cuda-version && format('-cuda{0}', matrix.variant.cuda-version) || '' }}-${{ matrix.variant.os }}-py${{ matrix.variant.python-version }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
