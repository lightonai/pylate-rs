# This workflow builds and publishes Python distributions to PyPI.
# It uses a self-hosted runner and a PyTorch container image
# to ensure the correct CUDA environment is available for the build.

name: Build and Publish Python 🐍 distributions

on:
  push:
    branches:
      - main

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.variant.name }} on self-hosted
    runs-on: self-hosted

    container:
      image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-devel

    strategy:
      fail-fast: false
      matrix:
        variant:
          - {
              name: "cuda",
              python-version: "3.10",
              cuda-version: "12.1",
              compute-caps: "80",
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential curl libssl-dev pkg-config
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build dependencies
        run: pip install maturin>=1.8.6 numpy>=1.26.4

      - name: Generate pyproject.toml
        run: python generate_configs.py ${{ matrix.variant.name }}

      - name: Find NVIDIA Driver Library Path
        id: find_cuda_lib
        run: |
          LIB_PATH=$(find / -name libcuda.so.1 2>/dev/null | head -n 1)
          if [ -z "$LIB_PATH" ]; then
            echo "::error::libcuda.so.1 not found on the runner. Please ensure the NVIDIA driver is correctly installed and accessible within the container."
            exit 1
          fi
          LIB_DIR=$(dirname "$LIB_PATH")
          echo "Found libcuda.so.1 in: $LIB_DIR"
          echo "CUDA_LIB_DIR=$LIB_DIR" >> $GITHUB_ENV
        shell: bash

      - name: Prepare Python Version for CIBW_BUILD
        id: prepare_python_version
        shell: bash
        run: |
          PYTHON_VERSION_NO_DOT=$(echo "${{ matrix.python-version }}" | tr -d '.')
          echo "PYTHON_VERSION_NO_DOT=$PYTHON_VERSION_NO_DOT" >> $GITHUB_OUTPUT

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp${{ steps.prepare_python_version.outputs.PYTHON_VERSION_NO_DOT }}-*"
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_* *-win32"
          CIBW_BUILD_VERBOSITY: 1
          LIBTORCH_BYPASS_VERSION_CHECK: 1
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_ARM64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT: |
            PIP_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cpu/torch_stable.html"
          CIBW_PIP_ARGS: --no-cache-dir
          CIBW_BEFORE_BUILD: "pip install torch==2.7.0 numpy maturin delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            LD_LIBRARY_PATH=$(python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))'):$LD_LIBRARY_PATH auditwheel repair -w {dest_dir} {wheel} --exclude libtorch.so --exclude libtorch_cpu.so --exclude libtorch_python.so

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant.name }}-cuda${{ matrix.variant.cuda-version }}-py${{ matrix.variant.python-version }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
