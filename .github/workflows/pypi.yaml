# This workflow builds and publishes Python distributions to PyPI.
# It uses a self-hosted runner and a PyTorch container image
# to ensure the correct CUDA environment is available for the build.
# This updated version includes a repair step to exclude PyTorch libraries,
# significantly reducing the final wheel size.

name: Build and Publish Python 🐍 distributions

on:
  push:
    branches:
      - main

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.variant.name }} on self-hosted
    runs-on: self-hosted

    container:
      image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-devel

    strategy:
      fail-fast: false
      matrix:
        variant:
          - {
              name: "cuda",
              python-version: "3.10",
              cuda-version: "12.1",
              compute-caps: "80",
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential curl libssl-dev pkg-config
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build dependencies
        run: pip install maturin>=1.8.6 numpy>=1.26.4 auditwheel

      - name: Generate pyproject.toml
        run: python generate_configs.py ${{ matrix.variant.name }}

      - name: Find NVIDIA Driver Library Path
        id: find_cuda_lib
        run: |
          LIB_PATH=$(find / -name libcuda.so.1 2>/dev/null | head -n 1)
          if [ -z "$LIB_PATH" ]; then
            echo "::error::libcuda.so.1 not found on the runner. Please ensure the NVIDIA driver is correctly installed and accessible within the container."
            exit 1
          fi
          LIB_DIR=$(dirname "$LIB_PATH")
          echo "Found libcuda.so.1 in: $LIB_DIR"
          echo "CUDA_LIB_DIR=$LIB_DIR" >> $GITHUB_ENV
        shell: bash

      - name: Build wheel
        env:
          LD_LIBRARY_PATH: ${{ env.CUDA_LIB_DIR }}:${LD_LIBRARY_PATH}
          CUDA_COMPUTE_CAP: ${{ matrix.variant.compute-caps }}
        run: maturin build --release --out dist
        shell: bash

      - name: Repair wheel and Exclude PyTorch Libs
        run: |
          set -e
          # Find the original wheel created by maturin
          ORIGINAL_WHEEL=$(find dist -name "*.whl" -print -quit)
          if [ -z "$ORIGINAL_WHEEL" ]; then
            echo "::error::No wheel file found in dist/ directory."
            exit 1
          fi
          echo "Repairing wheel: $ORIGINAL_WHEEL"

          # Define the library path for PyTorch, required by auditwheel for analysis
          TORCH_LIB_PATH=$(python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))')

          # Repair the wheel, excluding the large PyTorch libraries to reduce size.
          # The repaired, smaller wheel will be created in the dist/ directory.
          LD_LIBRARY_PATH=${TORCH_LIB_PATH}:${LD_LIBRARY_PATH} auditwheel repair "$ORIGINAL_WHEEL" -w dist \
            --exclude libtorch.so \
            --exclude libtorch_cpu.so \
            --exclude libtorch_python.so \
            --exclude libtorch_cuda.so

          # Remove the original, unrepaired wheel
          rm "$ORIGINAL_WHEEL"
          echo "Successfully repaired wheel and excluded PyTorch libraries."
        shell: bash

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant.name }}-cuda${{ matrix.variant.cuda-version }}-py${{ matrix.variant.python-version }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
