# This workflow builds and publishes Python distributions to PyPI.
# It is triggered on every push to the main branch.

name: Build and Publish Python 🐍 distributions

on:
  push:
    branches:
      - main

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.variant.name }} on self-hosted
    # Running on the host is necessary for the cuda-toolkit action to work correctly.
    # Ensure the self-hosted runner has a compatible OS (e.g., Ubuntu).
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        variant:
          - {
              name: "cuda",
              python-version: "3.12",
              cuda-version: "12.5.0",
              compute-caps: "80",
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl libssl-dev pkg-config
        shell: bash

      - name: Set up Python ${{ matrix.variant.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.variant.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA Toolkit ${{ matrix.variant.cuda-version }}
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.variant.cuda-version }}
          # Suffix is required for matrix builds to prevent artifact name conflicts.
          log-file-suffix: ${{ matrix.variant.name }}-${{ matrix.variant.cuda-version }}

      - name: Install Python build dependencies
        run: pip install maturin>=1.8.6 numpy>=1.26.4

      - name: Generate pyproject.toml
        run: python generate_configs.py ${{ matrix.variant.name }}

      - name: Build wheel
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.variant.compute-caps }}
        # The cuda-toolkit action sets the necessary environment variables (e.g., CUDA_PATH).
        run: maturin build --release --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant.name }}-cuda${{ matrix.variant.cuda-version }}-py${{ matrix.variant.python-version }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing to PyPI.

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
