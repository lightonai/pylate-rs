# This workflow builds and publishes Python distributions to PyPI.
# It is triggered on every push to the main branch.

name: Build and Publish Python 🐍 distributions

on:
  push:
    branches:
      - main

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.variant.name }} on self-hosted
    runs-on: self-hosted

    # Set a default shell to ensure Conda is activated for all subsequent steps.
    defaults:
      run:
        shell: bash -l {0}

    # Use a container for a consistent and clean build environment.
    container:
      image: python:3.12-slim-bookworm

    strategy:
      fail-fast: false
      matrix:
        variant:
          - {
              name: "cuda",
              python-version: "3.12",
              cuda-version: "12.5.0",
              compute-caps: "80",
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install essential build tools inside the minimal container.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential curl libssl-dev pkg-config
        shell: bash # This step does not require the Conda shell.

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.variant.python-version }}
          auto-update-conda: true

      - name: Install CUDA Toolkit
        run: conda install -y -c conda-forge cudatoolkit-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build dependencies
        run: pip install maturin>=1.8.6 numpy>=1.26.4

      - name: Generate pyproject.toml
        run: python generate_configs.py ${{ matrix.variant.name }}

      - name: Build wheel
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.variant.compute-caps }}
        run: maturin build --release --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant.name }}-cuda${{ matrix.variant.cuda-version }}-py${{ matrix.variant.python-version }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing to PyPI.

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
